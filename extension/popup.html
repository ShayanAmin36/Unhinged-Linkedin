<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    body { 
    font-family: Arial, sans-serif; 
    width: 500px;  /* Increased from 320px */
    min-height: 350px; /* Gives the popup a nice baseline height */
    padding: 15px; 
  }
    textarea { width: 100%; height: 60px; margin-bottom: 10px; padding: 5px; }
    button { width: 100%; padding: 10px; background: #0a66c2; color: white; border: none; cursor: pointer; font-weight: bold; border-radius: 5px;}
    button:hover { background: #004182; }
    #output { margin-top: 15px; font-size: 14px; white-space: pre-wrap; color: #333; }
    .loading { color: #666; font-style: italic; }
  </style>
</head>
<body>
  <h3>Corporate Spinner 💼</h3>
  <textarea id="userInput" placeholder="What terrible thing just happened? (e.g., 'I got arrested')"></textarea>
  <button id="spinButton">Synergize My Post</button>
  <div id="output"></div>

  <script type="module" src="dist/popup.js"></script>
</body>
</html>
